<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewPost Page</title>
    <!-- Link to css -->
    <link rel="stylesheet" href="style.css" />
    <!-- Box icons -->
    <link
      href='https://unpkg.com/boxicon@2.1.1/css/boxicons.min.css'
      rel="stylesheet" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <!-- Nav -->
      <div class="nav container">
        <!-- Logo -->
        <a href="index.html" class="logo">Lily<span>Lane</span></a>
        <!-- Login btn -->
        <a href="edit-post.html" class="Home">Edit</a>
      </div>
    </header>

    <!-- NewPost content -->
    <section class="post-header">
      <div class="header-content post-container">
          <!-- Back to home-->
           <a href="index.html" class="back-home">Bact To Home</a>
           <!-- Title -->
            <h1 class="header-title">New Post</h1>
      </div>
  </section>

  <!-- New post -->
    <div class="container" 
    style="padding: 40px;">
        <form id="newPostForm" style="    padding: 30px;
        font-size: 1.5rem;
        font-weight: 400;
        text-align: center;">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
            <label for="content">Content:</label>
            <textarea id="content" name="content" required></textarea>
            <button type="submit" style="font-size: 1rem;">Create Post</button>
        </form>
    </div>

    <!-- Footer -->
    <div class="footer container">
        <p>&#169; LilyLane All Right Reserved</p>
        <div class="social">
          <a href="#"><i class='bx bxl-facebook'></i></a>
          <a href="#"><i class='bx bxl-twitter'></i></a>
          <a href="#"><i class='bx bxl-instagram'></i></a>
          <a href="#"><i class='bx bxl-linkedin'></i></a>
        </div>
      </div>
      <!-- JQuery link -->
      <script
        src="https://code.jquery.com/jquery-3.6.0.js"
        integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk="
        crossorigin="anonymous"></script>
      <!-- Link to js -->
      <script src="script.js"></script>
      <script src="blog.js"></script>
    </body>
  </html>
